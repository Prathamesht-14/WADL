<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management System</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <h1>🔐 User Management System</h1>
    <div class="navbar-actions" id="navbarActions"></div>
  </nav>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Auth Container -->
  <div id="authContainer">
    <!-- Login Form -->
    <div id="loginForm" class="auth-container">
      <h2>Login</h2>
      <p>Sign in to your account to continue</p>
      <form id="loginFormElement">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input 
            type="email" 
            id="loginEmail" 
            name="email" 
            placeholder="Enter your email"
            required
          >
          <span class="error-message" id="loginEmailError"></span>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input 
            type="password" 
            id="loginPassword" 
            name="password" 
            placeholder="Enter your password"
            required
          >
          <span class="error-message" id="loginPasswordError"></span>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">
          Login
        </button>

        <div class="form-footer">
          Don't have an account? 
          <a href="#" onclick="switchToRegister(event)">Register here</a>
        </div>
      </form>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="auth-container" style="display: none;">
      <h2>Register</h2>
      <p>Create a new account</p>
      <form id="registerFormElement">
        <div class="form-group">
          <label for="registerFirstName">First Name</label>
          <input 
            type="text" 
            id="registerFirstName" 
            name="firstName" 
            placeholder="Enter your first name"
            required
          >
          <span class="error-message" id="registerFirstNameError"></span>
        </div>

        <div class="form-group">
          <label for="registerLastName">Last Name</label>
          <input 
            type="text" 
            id="registerLastName" 
            name="lastName" 
            placeholder="Enter your last name"
            required
          >
          <span class="error-message" id="registerLastNameError"></span>
        </div>

        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input 
            type="email" 
            id="registerEmail" 
            name="email" 
            placeholder="Enter your email"
            required
          >
          <span class="error-message" id="registerEmailError"></span>
        </div>

        <div class="form-group">
          <label for="registerPhone">Phone</label>
          <input 
            type="tel" 
            id="registerPhone" 
            name="phone" 
            placeholder="Enter your phone number"
          >
          <span class="error-message" id="registerPhoneError"></span>
        </div>

        <div class="form-group">
          <label for="registerPassword">Password</label>
          <input 
            type="password" 
            id="registerPassword" 
            name="password" 
            placeholder="Enter your password (min 6 characters)"
            required
          >
          <span class="error-message" id="registerPasswordError"></span>
        </div>

        <button type="submit" class="btn btn-success" style="width: 100%;">
          Register
        </button>

        <div class="form-footer">
          Already have an account? 
          <a href="#" onclick="switchToLogin(event)">Login here</a>
        </div>
      </form>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
