<!DOCTYPE html>
<html>

<head>
    <title>Result</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .container {
            width: 40%;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 100px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
            text-align: center;
        }

        h2 {
            color: green;
        }

        button {
            margin-top: 20px;
            padding: 10px;
            border: none;
            background: blue;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Quiz Result</h2>

        <div id="result"></div>

        <button onclick="goBack()">Try Again</button>
    </div>

    <script>

        let correctAnswers = ["a", "a", "a", "a", "a"];

        let userAnswers = JSON.parse(localStorage.getItem("userAnswers"));

        let score = 0;

        for (let i = 0; i < correctAnswers.length; i++) {
            if (userAnswers[i] === correctAnswers[i]) {
                score++;
            }
        }

        document.getElementById("result").innerHTML =
            "<h3>Your Score: " + score + " / " + correctAnswers.length + "</h3>";

        function goBack() {
            window.location.href = "index.html";
        }

    </script>

</body>

</html>
