<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - User Management</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <h1>📊 User Management Dashboard</h1>
    <div class="navbar-actions">
      <div class="navbar-user">
        <span id="userDisplayName"></span>
      </div>
      <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Dashboard Layout -->
  <div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <ul class="sidebar-menu">
        <li><a href="#" class="active" onclick="showSection('users', event)">👥 Users</a></li>
        <li><a href="#" onclick="showSection('stats', event)">📈 Statistics</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Users Section -->
      <section id="usersSection" class="section">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">User Management</h2>
            <button class="btn btn-primary" onclick="openAddUserModal()">
              ➕ Add New User
            </button>
          </div>

          <!-- Search and Filter -->
          <div class="search-filter">
            <input 
              type="text" 
              id="searchInput" 
              placeholder="Search by name or email..."
              onkeyup="filterUsers()"
            >
          </div>

          <!-- Users Table -->
          <div class="table-responsive">
            <table id="usersTable">
              <thead>
                <tr>
                  <th>User ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr>
                  <td colspan="5" style="text-align: center; padding: 2rem;">
                    <div class="spinner"></div>
                    Loading users...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Statistics Section -->
      <section id="statsSection" class="section" style="display: none;">
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Statistics</h2>
          </div>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1rem;">
            <div style="padding: 1.5rem; background: var(--bg-color); border-radius: 0.375rem;">
              <h3 style="color: var(--text-color); margin-bottom: 0.5rem;">Total Users</h3>
              <p style="font-size: 2rem; color: var(--primary-color); font-weight: 600;" id="totalUsers">0</p>
            </div>
            <div style="padding: 1.5rem; background: var(--bg-color); border-radius: 0.375rem;">
              <h3 style="color: var(--text-color); margin-bottom: 0.5rem;">Total Registered</h3>
              <p style="font-size: 2rem; color: var(--secondary-color); font-weight: 600;" id="lastRegistered"></p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <!-- Add/Edit User Modal -->
  <div id="userModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add New User</h2>
        <button class="modal-close" onclick="closeUserModal()">&times;</button>
      </div>

      <form id="userForm">
        <div class="form-group">
          <label for="userFirstName">First Name</label>
          <input 
            type="text" 
            id="userFirstName" 
            name="firstName" 
            placeholder="Enter first name"
            required
          >
          <span class="error-message" id="userFirstNameError"></span>
        </div>

        <div class="form-group">
          <label for="userLastName">Last Name</label>
          <input 
            type="text" 
            id="userLastName" 
            name="lastName" 
            placeholder="Enter last name"
            required
          >
          <span class="error-message" id="userLastNameError"></span>
        </div>

        <div class="form-group">
          <label for="userEmail">Email</label>
          <input 
            type="email" 
            id="userEmail" 
            name="email" 
            placeholder="Enter email"
            required
          >
          <span class="error-message" id="userEmailError"></span>
        </div>

        <div class="form-group">
          <label for="userPhone">Phone</label>
          <input 
            type="tel" 
            id="userPhone" 
            name="phone" 
            placeholder="Enter phone number"
          >
          <span class="error-message" id="userPhoneError"></span>
        </div>

        <div class="form-group">
          <label for="userPassword" id="passwordLabel">Password</label>
          <input 
            type="password" 
            id="userPassword" 
            name="password" 
            placeholder="Enter password (min 6 characters)"
            required
          >
          <span class="error-message" id="userPasswordError"></span>
        </div>

        <div class="form-group" style="flex-direction: row; gap: 1rem;">
          <button type="submit" class="btn btn-success" style="flex: 1;">Save User</button>
          <button type="button" class="btn btn-danger" style="flex: 1;" onclick="closeUserModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="modal">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h2 class="modal-title">Confirm Delete</h2>
        <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
      </div>
      <p>Are you sure you want to delete this user? This action cannot be undone.</p>
      <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
        <button class="btn btn-danger" style="flex: 1;" onclick="confirmDelete()">Delete</button>
        <button class="btn btn-primary" style="flex: 1;" onclick="closeDeleteModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script src="assets/js/dashboard.js"></script>
</body>
</html>
