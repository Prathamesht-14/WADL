<!DOCTYPE html>
<html>

<head>
    <title>Contact Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
            text-align: center;
            padding: 50px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 50%;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            color: #333;
        }

        h1 {
            margin-top: 0;
            color: #444;
        }

        .form-group {
            margin: 15px 0;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        .submit-btn {
            background: #a18cd1;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 10px;
            width: 100%;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #8e7cc3;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #667eea;
            font-weight: bold;
        }
        
        a:hover {
            color: #ff6b6b;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>📞 Contact Us</h1>
        <p>If you have any questions or feedback, feel free to reach out.</p>
        
        <form action="/" method="GET">
            <div class="form-group">
                <label>Name:</label>
                <input type="text" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Message:</label>
                <textarea rows="4" placeholder="Enter your message" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message</button>
        </form>

        <a href="/">⬅ Back to Home</a>
    </div>
</body>

</html>
