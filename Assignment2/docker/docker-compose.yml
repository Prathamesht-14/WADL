version: '3.8'

services:
  server:
    build: 
      context: ./server
    container_name: recurviz-server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  client:
    build:
      context: ./client
    container_name: recurviz-client
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
